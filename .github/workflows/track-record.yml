name: Track Record

on:
  schedule:
    - cron: '45 6,10,14,18,22 * * *'
  workflow_dispatch:

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - name: Record today's picks
        run: |
          curl -s -X POST -A "Mozilla/5.0 (compatible; PREDIXA-Bot)" \
            -H "Content-Type: application/json" \
            -d '{"trigger":"gh-action"}' \
            "https://predixa.co.tz/cron/track-record.php?key=pred-tz" || \
            echo "Track record failed (will retry next schedule)"
