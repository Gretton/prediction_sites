name: Scrape Predictions & Intersection

on:
  schedule:
    - cron: '0 6,10,14,18,22 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package.json

      - name: Install deps
        run: npm install

      - name: Run scrapers
        run: node run_all.js

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scraped-picks
          path: output/picks.json
          retention-days: 7

      - name: Post intersection to predixa.co.tz
        run: |
          curl -s -X POST -H "Content-Type: application/json" \
            -d @output/picks.json \
            "https://predixa.co.tz/cron/receiver.php?key=pred-tz"
        continue-on-error: true

      - name: Commit picks.json
        run: |
          git config user.name "pred-bot"
          git config user.email "bot@predixa.co.tz"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Gretton/prediction_sites.git
          git add --force output/picks.json
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "chore: picks.json [$(date +%Y-%m-%d-%H:%M)]"
          git push
