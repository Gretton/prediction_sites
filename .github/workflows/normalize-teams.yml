name: Normalize Teams (one-time migration)

on:
  workflow_dispatch:

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger team normalization on predixa.co.tz
        run: |
          curl -s -X POST -A "PREDIXA-Bot" \
            "https://predixa.co.tz/cron/normalize_teams.php?key=pred_f3cc603ea4f0e1a6038171dba59f41b601c0f815d1c1d580" || \
            echo "normalize_teams failed"
