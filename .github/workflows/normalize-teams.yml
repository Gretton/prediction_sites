name: Normalize Teams (one-time migration)

on:
  workflow_dispatch:

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger team normalization on predixa.co.tz
        run: |
          curl -s -X POST -A "PREDIXA-Bot" \
            "https://predixa.co.tz/cron/normalize_teams.php?key=pred-tz" || \
            echo "normalize_teams failed"
