name: Collect Match Stats

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  collect-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger stats collection (1 match, synchronous)
        run: |
          curl -s "https://predixa.co.tz/cron/run_stats.php?key=${{ secrets.STATS_SECRET_KEY }}&limit=1" | python3 -m json.tool || echo "Collection failed"
        continue-on-error: true
