name: ML Predict (XGBoost)

on:
  schedule:
    - cron: '30 7,13,19 * * *'
  workflow_dispatch:

jobs:
  ml-predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ML dependencies
        run: |
          pip install pandas numpy xgboost requests

      - name: Run ML training + prediction
        id: ml
        run: |
          python cron/ml_train.py 2>&1
        continue-on-error: true
        env:
          API_BASE: https://predixa.co.tz
          API_KEY: pred_f3cc603ea4f0e1a6038171dba59f41b601c0f815d1c1d580
          LOOKBACK_DAYS: 730

      - name: Upload training artifact
        uses: actions/upload-artifact@v4
        with:
          name: ml-predictions
          path: ml_output.json
          retention-days: 7
        continue-on-error: true
