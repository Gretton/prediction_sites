name: Analyze Picks

on:
  schedule:
    - cron: '30 6,10,14,18,22 * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger analysis on predixa.co.tz
        run: |
          curl -s -X POST "https://predixa.co.tz/cron/analyze.php?key=pred-tz" || \
            echo "Analysis trigger failed (will retry next schedule)"
