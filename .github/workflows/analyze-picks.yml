name: Analyze Picks

on:
  schedule:
    - cron: '30 6,10,14,18,22 * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger analysis on predixa.co.tz
        run: |
          curl -s -X POST -A "Mozilla/5.0 (compatible; PREDIXA-Bot)" \
            -H "Content-Type: application/json" \
            -d '{"trigger":"gh-action"}' \
            "https://predixa.co.tz/cron/analyze.php?key=pred_f3cc603ea4f0e1a6038171dba59f41b601c0f815d1c1d580" || \
            echo "Analysis trigger failed (will retry next schedule)"
