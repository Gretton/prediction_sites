name: Settle Scores

on:
  schedule:
    - cron: '0 7,11,15,19,23 * * *'
  workflow_dispatch:

jobs:
  settle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package.json

      - name: Install deps
        run: npm install

      - name: Scrape scores from SportyBet
        id: scores
        run: |
          node scrape_scores.js > matches.json
          echo "count=$(node -e "console.log(JSON.parse(require('fs').readFileSync('matches.json','utf8')).matches.length)")" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post scores to predixa.co.tz (fetch_scores)
        if: steps.scores.outputs.count > 0
        run: |
          curl -s -X POST -A "Mozilla/5.0 (compatible; PREDIXA-Bot)" \
            -H "Content-Type: application/json" \
            -d @matches.json \
            "https://predixa.co.tz/cron/fetch_scores.php?key=pred_f3cc603ea4f0e1a6038171dba59f41b601c0f815d1c1d580" || \
            echo "fetch_scores failed"

      - name: Wait for DB write
        if: steps.scores.outputs.count > 0
        run: sleep 5

      - name: Settle pending picks
        run: |
          curl -s -X POST -A "Mozilla/5.0 (compatible; PREDIXA-Bot)" \
            -d '{"trigger":"settle"}' \
            "https://predixa.co.tz/cron/settle_picks.php?key=pred_f3cc603ea4f0e1a6038171dba59f41b601c0f815d1c1d580" || \
            echo "settle_picks failed"
