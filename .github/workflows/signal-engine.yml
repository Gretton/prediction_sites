name: Signal Engine Cron

on:
  schedule:
    - cron: '0 7 * * *'   # Daily 07:00 UTC (10:00 EAT)
  workflow_dispatch:

jobs:
  signal-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger signal engine
        run: |
          curl -s -A "Mozilla/5.0 (compatible; PREDIXA-Bot)" \
            "https://predixa.co.tz/cron/signal_engine.php?key=pred_f3cc603ea4f0e1a6038171dba59f41b601c0f815d1c1d580" || \
            echo "Signal engine trigger failed (will retry next schedule)"